<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39d353;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.4"/>

  <!-- Accent glow blob left -->
  <ellipse cx="200" cy="320" rx="280" ry="200" fill="#39d353" opacity="0.04"/>
  <!-- Accent glow blob right -->
  <ellipse cx="1080" cy="320" rx="280" ry="200" fill="#0ea5e9" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGrad)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accentGrad)"/>

  <!-- Left vertical accent -->
  <rect x="80" y="80" width="3" height="480" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Minecraft block icon group (pixel art style) -->
  <g transform="translate(112, 220)" filter="url(#shadow)">
    <!-- Grass block top -->
    <rect x="0" y="0" width="60" height="60" fill="#5a8a00" rx="4"/>
    <rect x="0" y="0" width="60" height="20" fill="#78b000" rx="4"/>
    <!-- Side dirt -->
    <rect x="0" y="20" width="60" height="40" fill="#8B6914" rx="0"/>
    <!-- Pixel texture top -->
    <rect x="8" y="4" width="8" height="8" fill="#6aa000" opacity="0.5"/>
    <rect x="24" y="8" width="6" height="6" fill="#6aa000" opacity="0.5"/>
    <rect x="40" y="4" width="10" height="6" fill="#6aa000" opacity="0.5"/>
    <!-- Pixel texture side -->
    <rect x="10" y="26" width="6" height="6" fill="#7a5a10" opacity="0.4"/>
    <rect x="28" y="34" width="8" height="8" fill="#7a5a10" opacity="0.4"/>
    <rect x="44" y="28" width="6" height="6" fill="#7a5a10" opacity="0.4"/>
  </g>

  <!-- Second block stacked -->
  <g transform="translate(112, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="60" height="60" fill="#8B6914" rx="0"/>
    <rect x="8" y="10" width="8" height="8" fill="#7a5a10" opacity="0.4"/>
    <rect x="28" y="20" width="6" height="6" fill="#7a5a10" opacity="0.4"/>
    <rect x="44" y="12" width="8" height="8" fill="#7a5a10" opacity="0.4"/>
    <rect x="14" y="36" width="10" height="10" fill="#7a5a10" opacity="0.4"/>
    <rect x="38" y="32" width="8" height="8" fill="#7a5a10" opacity="0.4"/>
  </g>

  <!-- Windows logo (simplified) -->
  <g transform="translate(112, 380)">
    <rect x="0" y="0" width="27" height="27" fill="#0078d4" rx="2"/>
    <rect x="31" y="0" width="27" height="27" fill="#0078d4" rx="2"/>
    <rect x="0" y="31" width="27" height="27" fill="#0078d4" rx="2"/>
    <rect x="31" y="31" width="27" height="27" fill="#0078d4" rx="2"/>
  </g>

  <!-- Main title -->
  <text x="220" y="280"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="78"
        font-weight="700"
        letter-spacing="-2"
        fill="#ffffff"
        filter="url(#glow)">jennyMod</text>

  <!-- Gradient accent on "Installer" -->
  <text x="220" y="370"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="78"
        font-weight="700"
        letter-spacing="-2"
        fill="url(#accentGrad)"
        filter="url(#glow)">Installer</text>

  <!-- Subtitle -->
  <text x="222" y="420"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#8b949e"
        letter-spacing="0.5">One-click Windows installer for the popular Minecraft mod</text>

  <!-- Divider line -->
  <line x1="220" y1="445" x2="900" y2="445" stroke="#30363d" stroke-width="1"/>

  <!-- Feature badges -->
  <!-- Badge 1: Windows Only -->
  <g transform="translate(222, 465)">
    <rect x="0" y="0" width="170" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#0078d4"/>
    <rect cx="18" cy="18" x="10" y="14" width="7" height="7" fill="#0078d4"/>
    <text x="34" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e6edf3" font-weight="500">Windows Only</text>
  </g>

  <!-- Badge 2: MIT License -->
  <g transform="translate(406", "465)">
    <rect x="0" y="0" width="150" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#39d353" font-weight="600">MIT</text>
    <text x="50" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e6edf3" font-weight="400"> License</text>
  </g>

  <!-- Badge 3: Auto-Update -->
  <g transform="translate(570, 465)">
    <rect x="0" y="0" width="180" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#0ea5e9" font-weight="500">Auto-Update CI</text>
  </g>

  <!-- Badge 4: Open Source -->
  <g transform="translate(764, 465)">
    <rect x="0" y="0" width="160" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#f78166" font-weight="500">Open Source</text>
  </g>

  <!-- Right panel: terminal-style card -->
  <g transform="translate(950, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="400" fill="url(#cardGrad)" rx="12" stroke="#30363d" stroke-width="1"/>
    <!-- Terminal top bar -->
    <rect x="0" y="0" width="260" height="36" fill="#21262d" rx="12"/>
    <rect x="0" y="24" width="260" height="12" fill="#21262d"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    <!-- Terminal title -->
    <text x="130" y="23" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">install.ps1</text>
    <!-- Terminal content -->
    <text x="16" y="68" font-family="'Courier New', monospace" font-size="13" fill="#39d353">$ .\install.ps1</text>
    <text x="16" y="94" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Detecting Java...</text>
    <text x="16" y="116" font-family="'Courier New', monospace" font-size="12" fill="#39d353">[OK]   Java 17 found</text>
    <text x="16" y="138" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Checking Minecraft...</text>
    <text x="16" y="160" font-family="'Courier New', monospace" font-size="12" fill="#39d353">[OK]   v1.12.2 detected</text>
    <text x="16" y="182" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Downloading mod...</text>
    <!-- Progress bar -->
    <rect x="16" y="196" width="228" height="8" fill="#30363d" rx="4"/>
    <rect x="16" y="196" width="200" height="8" fill="url(#accentGrad)" rx="4"/>
    <text x="16" y="222" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Installing files...</text>
    <text x="16" y="244" font-family="'Courier New', monospace" font-size="12" fill="#39d353">[OK]   Copying to mods/</text>
    <text x="16" y="266" font-family="'Courier New', monospace" font-size="12" fill="#39d353">[OK]   Config applied</text>
    <text x="16" y="288" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">----------------------------</text>
    <text x="16" y="314" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" font-weight="bold">Installation complete!</text>
    <text x="16" y="336" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">Launch Minecraft to play.</text>
    <!-- Blinking cursor -->
    <rect x="16" y="358" width="10" height="16" fill="#39d353" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- GitHub-style URL hint at bottom -->
  <text x="640" y="610"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="16"
        fill="#30363d"
        letter-spacing="1">github.com / jennymod-installer</text>
</svg>
